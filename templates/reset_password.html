<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>重置密码 - 冰箱里面还有啥</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/ice-box.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/mobile.css') }}">
    <style>
        /* 确保必要的CSS变量可用 */
        :root {
            --border-color: #e5e7eb;
            --primary-color: #667eea;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }
        
        body.dark-mode {
            --border-color: #374151;
        }
        
        /* 重置密码页面专用样式 */
        body {
            background: var(--bg-color);
            overflow-y: auto;
        }

        .reset-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        /* Logo区域 */
        .reset-logo-section {
            text-align: center;
            padding: 40px 0 32px;
        }

        .reset-logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
        }
        
        .reset-logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .reset-logo-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .reset-logo-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 表单区域 */
        .reset-form-section {
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
        }

        .reset-form-group {
            margin-bottom: 20px;
        }

        .reset-form-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .reset-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .reset-input-icon {
            position: absolute;
            left: 16px;
            color: var(--text-secondary);
            font-size: 18px;
        }

        .reset-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            background: var(--card-bg);
            color: var(--text-primary);
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .reset-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .toggle-password-btn {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            padding: 8px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-password-btn:active {
            color: var(--primary-color);
        }

        /* 密码要求列表 */
        .password-requirements {
            margin-top: 8px;
            padding: 12px;
            list-style: none;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .password-requirements.show {
            display: block;
        }

        .password-requirements li {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .password-requirements li i {
            font-size: 14px;
            width: 16px;
            text-align: center;
        }

        .password-requirements li.valid {
            color: #10b981 !important;
        }

        .password-requirements li.valid i {
            color: #10b981 !important;
        }

        .password-requirements li.invalid {
            color: #ef4444 !important;
        }

        .password-requirements li.invalid i {
            color: #ef4444 !important;
        }

        /* 提交按钮 */
        .reset-submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            margin-top: 24px;
        }

        .reset-submit-btn:active {
            transform: scale(0.98);
        }

        .reset-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        body.dark-mode .reset-submit-btn {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
        }

        /* Toast提示 */
        .toast-message {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            color: var(--text-primary);
            padding: 14px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            min-width: 200px;
            max-width: 90vw;
        }

        .toast-message.show {
            display: flex;
        }

        .toast-message.success {
            border-left: 4px solid #10b981;
        }

        .toast-message.error {
            border-left: 4px solid #ef4444;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="reset-page">
        <!-- Logo区域 -->
        <div class="reset-logo-section">
            <div class="reset-logo-icon">
                <img src="{{ url_for('static', filename='images/ice-box.png') }}" alt="冰箱图标">
            </div>
            <h1 class="reset-logo-title">重置密码</h1>
            <p class="reset-logo-subtitle">请设置您的新密码</p>
        </div>

        <!-- 表单区域 -->
        <div class="reset-form-section">
            <form id="resetForm">
                <input type="hidden" id="token" value="{{ token }}">
                
                <div class="reset-form-group">
                    <label class="reset-form-label" for="password">
                        <i class="fas fa-lock"></i>
                        <span>新密码</span>
                    </label>
                    <div class="reset-input-wrapper">
                        <i class="fas fa-lock reset-input-icon"></i>
                        <input type="password" class="reset-input" id="password" name="password" 
                               placeholder="请输入新密码" required>
                        <button type="button" class="toggle-password-btn" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <ul class="password-requirements" id="passwordRequirements">
                        <li id="reqLength"><i class="fas fa-times-circle"></i> 至少6个字符</li>
                        <li id="reqLetter"><i class="fas fa-times-circle"></i> 包含字母</li>
                        <li id="reqNumber"><i class="fas fa-times-circle"></i> 包含数字</li>
                    </ul>
                </div>
                
                <div class="reset-form-group">
                    <label class="reset-form-label" for="confirmPassword">
                        <i class="fas fa-lock"></i>
                        <span>确认密码</span>
                    </label>
                    <div class="reset-input-wrapper">
                        <i class="fas fa-lock reset-input-icon"></i>
                        <input type="password" class="reset-input" id="confirmPassword" name="confirmPassword" 
                               placeholder="请再次输入新密码" required>
                        <button type="button" class="toggle-password-btn" id="toggleConfirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="reset-submit-btn" id="submitBtn">
                    <i class="fas fa-check"></i>
                    <span>重置密码</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast-message" id="toastMessage">
        <i class="fas fa-info-circle"></i>
        <span id="toastText"></span>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // 显示/隐藏密码
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('confirmPassword');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // 密码强度检测
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const requirementsBox = document.getElementById('passwordRequirements');
            
            if (password.length > 0) {
                requirementsBox.classList.add('show');
            } else {
                requirementsBox.classList.remove('show');
            }
            
            const hasLength = password.length >= 6;
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            
            const reqLength = document.getElementById('reqLength');
            const reqLetter = document.getElementById('reqLetter');
            const reqNumber = document.getElementById('reqNumber');
            
            if (hasLength) {
                reqLength.className = 'valid';
                reqLength.querySelector('i').className = 'fas fa-check-circle';
            } else {
                reqLength.className = 'invalid';
                reqLength.querySelector('i').className = 'fas fa-times-circle';
            }
            
            if (hasLetter) {
                reqLetter.className = 'valid';
                reqLetter.querySelector('i').className = 'fas fa-check-circle';
            } else {
                reqLetter.className = 'invalid';
                reqLetter.querySelector('i').className = 'fas fa-times-circle';
            }
            
            if (hasNumber) {
                reqNumber.className = 'valid';
                reqNumber.querySelector('i').className = 'fas fa-check-circle';
            } else {
                reqNumber.className = 'invalid';
                reqNumber.querySelector('i').className = 'fas fa-times-circle';
            }
        });

        // 显示Toast提示
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toastMessage');
            const toastText = document.getElementById('toastText');
            const icon = toast.querySelector('i');
            
            toast.classList.remove('success', 'error');
            toast.classList.add(type);
            
            icon.className = 'fas';
            if (type === 'success') {
                icon.classList.add('fa-check-circle');
            } else {
                icon.classList.add('fa-times-circle');
            }
            
            toastText.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 表单提交
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const token = document.getElementById('token').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!password || !confirmPassword) {
                showToast('请填写所有字段', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showToast('两次输入的密码不一致', 'error');
                return;
            }
            
            if (password.length < 6) {
                showToast('密码长度至少为6个字符', 'error');
                return;
            }
            
            if (!/[a-zA-Z]/.test(password)) {
                showToast('密码必须包含字母', 'error');
                return;
            }
            
            if (!/\d/.test(password)) {
                showToast('密码必须包含数字', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            const btnText = submitBtn.querySelector('span');
            const btnIcon = submitBtn.querySelector('i');
            submitBtn.disabled = true;
            btnIcon.innerHTML = '<div class="spinner"></div>';
            btnText.textContent = '处理中...';
            
            try {
                const response = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token: token, password: password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showToast('密码重置成功！', 'success');
                    setTimeout(() => {
                        window.location.href = '/auth/login';
                    }, 1500);
                } else {
                    showToast(data.error || '密码重置失败', 'error');
                    submitBtn.disabled = false;
                    btnIcon.innerHTML = '';
                    btnIcon.className = 'fas fa-check';
                    btnText.textContent = '重置密码';
                }
            } catch (error) {
                console.error('重置密码失败:', error);
                showToast('网络错误，请稍后重试', 'error');
                submitBtn.disabled = false;
                btnIcon.innerHTML = '';
                btnIcon.className = 'fas fa-check';
                btnText.textContent = '重置密码';
            }
        });

        // 初始化深色模式
        function initDarkMode() {
            try {
                const darkModeSetting = localStorage.getItem('darkMode');
                const isAutoMode = localStorage.getItem('darkModeAuto') !== 'false';
                
                let shouldBeDark = false;
                
                if (isAutoMode) {
                    const hour = new Date().getHours();
                    shouldBeDark = hour >= 18 || hour < 6;
                } else {
                    shouldBeDark = darkModeSetting === 'enabled';
                }
                
                if (shouldBeDark) {
                    document.body.classList.add('dark-mode');
                }
            } catch (e) {
                console.warn('无法读取深色模式设置', e);
            }
        }

        initDarkMode();
    </script>
</body>
</html>
