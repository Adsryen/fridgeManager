<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 冰箱里面还有啥</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/ice-box.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .password-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .password-title {
            text-align: center;
            margin-bottom: 30px;
            color: #667eea;
            font-weight: bold;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: bold;
        }
        .btn-submit:hover {
            opacity: 0.9;
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .input-group-text {
            cursor: pointer;
        }
        .password-strength {
            height: 5px;
            border-radius: 3px;
            margin-top: 5px;
            transition: all 0.3s;
        }
        .strength-weak { background: #dc3545; width: 33%; }
        .strength-medium { background: #ffc107; width: 66%; }
        .strength-strong { background: #28a745; width: 100%; }
        .requirements {
            font-size: 0.875rem;
            color: #6c757d;
            margin-top: 5px;
        }
        .requirements li {
            list-style: none;
            padding-left: 20px;
            position: relative;
        }
        .requirements li:before {
            content: "○";
            position: absolute;
            left: 0;
        }
        .requirements li.valid:before {
            content: "✓";
            color: #28a745;
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="password-container">
        <h2 class="password-title"><i class="fas fa-key"></i> 修改密码</h2>
        
        <div id="alertBox" class="alert alert-danger d-none" role="alert">
            <i class="fas fa-exclamation-circle"></i>
            <span id="alertMessage"></span>
        </div>

        <form id="passwordForm">
            <div class="mb-3">
                <label for="old_password" class="form-label">原密码 <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="old_password" name="old_password" 
                           placeholder="请输入原密码" required>
                    <span class="input-group-text" id="toggleOldPassword">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>

            <div class="mb-3">
                <label for="new_password" class="form-label">新密码 <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="new_password" name="new_password" 
                           placeholder="请输入新密码" required minlength="6">
                    <span class="input-group-text" id="toggleNewPassword">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
                <div class="password-strength" id="passwordStrength"></div>
                <ul class="requirements" id="passwordRequirements">
                    <li id="req-length">至少 6 个字符</li>
                    <li id="req-letter">包含字母</li>
                    <li id="req-number">包含数字</li>
                </ul>
            </div>

            <div class="mb-3">
                <label for="confirm_password" class="form-label">确认新密码 <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                           placeholder="请再次输入新密码" required>
                    <span class="input-group-text" id="toggleConfirmPassword">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
                <div class="invalid-feedback" id="confirmFeedback">
                    两次输入的密码不一致
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">
                <i class="fas fa-check"></i> 确认修改
            </button>
            
            <div class="text-center mt-3">
                <a href="/auth/profile" class="text-muted">
                    <i class="fas fa-arrow-left"></i> 返回个人资料
                </a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script>
        // 显示/隐藏密码
        $('#toggleOldPassword, #toggleNewPassword, #toggleConfirmPassword').on('click', function() {
            const inputId = $(this).attr('id').replace('toggle', '').replace('Password', '_password').toLowerCase();
            const passwordInput = $(`#${inputId}`);
            const icon = $(this).find('i');
            
            if (passwordInput.attr('type') === 'password') {
                passwordInput.attr('type', 'text');
                icon.removeClass('fa-eye').addClass('fa-eye-slash');
            } else {
                passwordInput.attr('type', 'password');
                icon.removeClass('fa-eye-slash').addClass('fa-eye');
            }
        });

        // 密码强度检测
        $('#new_password').on('input', function() {
            const password = $(this).val();
            const strengthBar = $('#passwordStrength');
            
            const hasLength = password.length >= 6;
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            
            $('#req-length').toggleClass('valid', hasLength);
            $('#req-letter').toggleClass('valid', hasLetter);
            $('#req-number').toggleClass('valid', hasNumber);
            
            let strength = 0;
            if (hasLength) strength++;
            if (hasLetter) strength++;
            if (hasNumber) strength++;
            if (password.length >= 10) strength++;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;
            
            strengthBar.removeClass('strength-weak strength-medium strength-strong');
            if (strength <= 2) {
                strengthBar.addClass('strength-weak');
            } else if (strength <= 4) {
                strengthBar.addClass('strength-medium');
            } else {
                strengthBar.addClass('strength-strong');
            }
        });

        // 确认密码验证
        $('#confirm_password').on('input', function() {
            const newPassword = $('#new_password').val();
            const confirmPassword = $(this).val();
            const feedback = $('#confirmFeedback');
            
            if (confirmPassword && newPassword !== confirmPassword) {
                $(this).addClass('is-invalid');
                feedback.show();
            } else {
                $(this).removeClass('is-invalid');
                feedback.hide();
            }
        });

        function showAlert(message, type = 'danger') {
            const alertBox = $('#alertBox');
            const alertMessage = $('#alertMessage');
            
            alertBox.removeClass('alert-danger alert-success alert-warning')
                    .addClass(`alert-${type}`)
                    .removeClass('d-none');
            alertMessage.text(message);
            
            if (type === 'success') {
                setTimeout(() => {
                    window.location.href = '/auth/profile';
                }, 2000);
            }
        }

        $('#passwordForm').on('submit', function(e) {
            e.preventDefault();
            
            const newPassword = $('#new_password').val();
            const confirmPassword = $('#confirm_password').val();
            
            if (newPassword !== confirmPassword) {
                showAlert('两次输入的密码不一致', 'warning');
                return;
            }
            
            const submitBtn = $('#submitBtn');
            submitBtn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> 修改中...');
            
            $.ajax({
                url: '/auth/change-password',
                method: 'POST',
                data: $(this).serialize(),
                success: function(response) {
                    showAlert('密码修改成功！正在跳转...', 'success');
                },
                error: function(xhr) {
                    const error = xhr.responseJSON?.error || '密码修改失败';
                    showAlert(error, 'danger');
                    submitBtn.prop('disabled', false).html('<i class="fas fa-check"></i> 确认修改');
                }
            });
        });
    </script>
</body>
</html>
