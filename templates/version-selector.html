<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择版本 - 冰箱管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .version-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 600px) {
            .version-cards {
                grid-template-columns: 1fr;
            }
        }
        
        .version-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .version-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .version-card .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .version-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #1f2937;
        }
        
        .version-card p {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
        }
        
        .version-card.desktop {
            border: 3px solid transparent;
        }
        
        .version-card.desktop:hover {
            border-color: #667eea;
        }
        
        .version-card.mobile {
            border: 3px solid transparent;
        }
        
        .version-card.mobile:hover {
            border-color: #764ba2;
        }
        
        .auto-detect {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: white;
        }
        
        .auto-detect p {
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .auto-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .auto-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧊 冰箱管理系统</h1>
            <p>请选择适合您设备的版本</p>
        </div>
        
        <div class="version-cards">
            <a href="/" class="version-card desktop">
                <div class="icon">💻</div>
                <h2>桌面版</h2>
                <p>适合电脑、平板等大屏设备<br>功能完整，视图丰富</p>
            </a>
            
            <a href="/mobile" class="version-card mobile">
                <div class="icon">📱</div>
                <h2>移动版</h2>
                <p>专为手机优化设计<br>触摸友好，操作便捷</p>
            </a>
        </div>
        
        <div class="auto-detect">
            <p>💡 系统可以自动检测您的设备类型</p>
            <button class="auto-btn" onclick="autoDetect()">自动选择</button>
        </div>
    </div>
    
    <script>
        function autoDetect() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const mobileRegex = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i;
            
            if (mobileRegex.test(userAgent.toLowerCase()) || window.innerWidth <= 768) {
                window.location.href = '/mobile';
            } else {
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
