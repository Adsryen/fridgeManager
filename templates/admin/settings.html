<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系统设置 - 冰箱里面还有啥</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/ice-box.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/admin/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/admin/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/admin/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/admin/components.css') }}">
    <style>
        .setting-group {
            margin-bottom: var(--spacing-md);
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md) 0;
            border-bottom: 1px solid var(--divider-color);
        }
        
        .setting-item:last-child {
            border-bottom: none;
        }
        
        .setting-info {
            flex: 1;
        }
        
        .setting-label {
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
        }
        
        .setting-description {
            font-size: var(--font-size-small);
            color: var(--text-secondary);
            line-height: 1.4;
        }
        
        .setting-control {
            margin-left: var(--spacing-md);
        }
        
        .form-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }
        
        .form-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--divider-color);
            transition: .4s;
            border-radius: 28px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: var(--primary-color);
        }
        
        input:checked + .slider:before {
            transform: translateX(22px);
        }
        
        .form-input {
            width: 80px;
            text-align: center;
        }
        
        .maintenance-actions {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
        
        .info-item {
            padding: var(--spacing-sm) 0;
        }
        
        .info-item strong {
            display: block;
            margin-bottom: var(--spacing-xs);
            color: var(--text-secondary);
            font-size: var(--font-size-small);
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="admin-header">
        <a href="/admin/dashboard" class="admin-header-back">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="admin-header-title">系统设置</div>
        <div class="admin-header-action"></div>
    </header>

    <!-- 主内容区 -->
    <div class="admin-container">
        <div class="admin-content">
            <!-- 提示框 -->
            <div id="alertBox" class="alert" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <span id="alertMessage"></span>
            </div>

            <!-- 加载动画 -->
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
            </div>

            <!-- 基本设置 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-sliders-h"></i> 基本设置
                </div>
                <div class="card-body">
                    <form id="basicSettingsForm">
                        <div class="setting-item">
                            <div class="setting-info">
                                <div class="setting-label">允许用户注册</div>
                                <div class="setting-description">是否允许新用户自主注册账号</div>
                            </div>
                            <div class="setting-control">
                                <label class="form-switch">
                                    <input type="checkbox" name="allow_registration" 
                                           {% if settings.allow_registration != False %}checked{% endif %}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="setting-item">
                            <div class="setting-info">
                                <div class="setting-label">需要邮箱验证</div>
                                <div class="setting-description">新用户注册时是否需要验证邮箱</div>
                            </div>
                            <div class="setting-control">
                                <label class="form-switch">
                                    <input type="checkbox" name="require_email_verification" 
                                           {% if settings.require_email_verification %}checked{% endif %}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-block" style="margin-top: var(--spacing-md);">
                            <i class="fas fa-save"></i> 保存基本设置
                        </button>
                    </form>
                </div>
            </div>

            <!-- 物品管理设置 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-box"></i> 物品管理设置
                </div>
                <div class="card-body">
                    <form id="itemSettingsForm">
                        <div class="setting-item">
                            <div class="setting-info">
                                <div class="setting-label">默认过期提醒天数</div>
                                <div class="setting-description">物品即将过期的提前提醒天数</div>
                            </div>
                            <div class="setting-control">
                                <input type="number" class="form-control form-input" 
                                       name="default_expiry_warning_days" 
                                       value="{{ settings.default_expiry_warning_days or 3 }}" 
                                       min="1" max="30">
                            </div>
                        </div>
                        
                        <div class="setting-item">
                            <div class="setting-info">
                                <div class="setting-label">自动删除过期物品</div>
                                <div class="setting-description">自动删除过期超过指定天数的物品</div>
                            </div>
                            <div class="setting-control">
                                <label class="form-switch">
                                    <input type="checkbox" name="auto_delete_expired" 
                                           {% if settings.auto_delete_expired %}checked{% endif %}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="setting-item">
                            <div class="setting-info">
                                <div class="setting-label">自动删除天数</div>
                                <div class="setting-description">物品过期后多少天自动删除</div>
                            </div>
                            <div class="setting-control">
                                <input type="number" class="form-control form-input" 
                                       name="auto_delete_days" 
                                       value="{{ settings.auto_delete_days or 7 }}" 
                                       min="1" max="90">
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-block" style="margin-top: var(--spacing-md);">
                            <i class="fas fa-save"></i> 保存物品设置
                        </button>
                    </form>
                </div>
            </div>

            <!-- 安全设置 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-shield-alt"></i> 安全设置
                </div>
                <div class="card-body">
                    <form id="securitySettingsForm">
                        <div class="setting-item">
                            <div class="setting-info">
                                <div class="setting-label">密码最小长度</div>
                                <div class="setting-description">用户密码的最小字符数</div>
                            </div>
                            <div class="setting-control">
                                <input type="number" class="form-control form-input" 
                                       name="min_password_length" 
                                       value="{{ settings.min_password_length or 6 }}" 
                                       min="4" max="20">
                            </div>
                        </div>
                        
                        <div class="setting-item">
                            <div class="setting-info">
                                <div class="setting-label">启用登录日志</div>
                                <div class="setting-description">记录用户登录和操作日志</div>
                            </div>
                            <div class="setting-control">
                                <label class="form-switch">
                                    <input type="checkbox" name="enable_login_log" 
                                           {% if settings.enable_login_log != False %}checked{% endif %}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-block" style="margin-top: var(--spacing-md);">
                            <i class="fas fa-save"></i> 保存安全设置
                        </button>
                    </form>
                </div>
            </div>

            <!-- 系统维护 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-tools"></i> 系统维护
                </div>
                <div class="card-body">
                    <div class="maintenance-actions">
                        <button type="button" class="btn btn-warning btn-block" onclick="cleanExpiredItems()">
                            <i class="fas fa-trash-alt"></i> 清理过期物品
                        </button>
                        <button type="button" class="btn btn-info btn-block" onclick="backupDatabase()">
                            <i class="fas fa-download"></i> 数据库备份
                        </button>
                        <button type="button" class="btn btn-secondary btn-block" onclick="viewLogs()">
                            <i class="fas fa-file-alt"></i> 查看系统日志
                        </button>
                    </div>
                </div>
            </div>

            <!-- 系统信息 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-info-circle"></i> 系统信息
                </div>
                <div class="card-body">
                    <div class="info-grid">
                        <div class="info-item">
                            <strong>系统版本</strong>
                            <span class="badge badge-primary">v1.0.0</span>
                        </div>
                        <div class="info-item">
                            <strong>数据库类型</strong>
                            SQLite
                        </div>
                        <div class="info-item">
                            <strong>Python版本</strong>
                            {{ python_version }}
                        </div>
                        <div class="info-item">
                            <strong>数据库大小</strong>
                            {{ db_size or '未知' }}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <nav class="admin-nav">
        <a href="/admin/dashboard" class="admin-nav-item">
            <i class="fas fa-tachometer-alt"></i>
            <span>仪表板</span>
        </a>
        <a href="/admin/users" class="admin-nav-item">
            <i class="fas fa-users"></i>
            <span>用户</span>
        </a>
        <a href="/admin/settings" class="admin-nav-item active">
            <i class="fas fa-cog"></i>
            <span>设置</span>
        </a>
        <a href="/" class="admin-nav-item">
            <i class="fas fa-home"></i>
            <span>主页</span>
        </a>
    </nav>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin/utils.js') }}"></script>
    <script>
        // 保存基本设置
        document.getElementById('basicSettingsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const settings = {};
            
            for (let [key, value] of formData.entries()) {
                settings[key] = value;
            }
            
            // 处理复选框
            this.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                settings[checkbox.name] = checkbox.checked;
            });
            
            await saveSettings('basic', settings);
        });

        // 保存物品设置
        document.getElementById('itemSettingsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const settings = {};
            
            for (let [key, value] of formData.entries()) {
                settings[key] = value;
            }
            
            this.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                settings[checkbox.name] = checkbox.checked;
            });
            
            await saveSettings('item', settings);
        });

        // 保存安全设置
        document.getElementById('securitySettingsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const settings = {};
            
            for (let [key, value] of formData.entries()) {
                settings[key] = value;
            }
            
            this.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                settings[checkbox.name] = checkbox.checked;
            });
            
            await saveSettings('security', settings);
        });

        // 保存设置的通用函数
        async function saveSettings(category, settings) {
            showLoading(true);
            
            try {
                const result = await apiRequest('/admin/settings/save', 'POST', { category, settings });
                showAlert('设置保存成功!', 'success');
                
                if (settings.system_name) {
                    setTimeout(() => location.reload(), 1500);
                }
            } catch (error) {
                showAlert('保存失败: ' + error.message, 'danger');
            } finally {
                showLoading(false);
            }
        }

        // 清理过期物品
        async function cleanExpiredItems() {
            showConfirm('确认操作', '确定要删除所有过期物品吗?此操作不可恢复!', async () => {
                showLoading(true);
                
                try {
                    const result = await apiRequest('/admin/maintenance/clean-expired', 'POST');
                    showAlert(`已清理 ${result.count} 个过期物品`, 'success');
                } catch (error) {
                    showAlert('清理失败: ' + error.message, 'danger');
                } finally {
                    showLoading(false);
                }
            });
        }

        // 备份数据库
        function backupDatabase() {
            showAlert('正在生成备份...', 'info');
            window.location.href = '/admin/maintenance/backup';
        }

        // 查看日志
        function viewLogs() {
            window.location.href = '/admin/maintenance/logs';
        }
    </script>
</body>
</html>
