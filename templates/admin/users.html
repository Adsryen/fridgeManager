<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 冰箱里面还有啥</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/ice-box.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: #f5f5f5; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
        }
        
        * {
            box-sizing: border-box;
        }
        
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: fixed;
            width: 250px;
            z-index: 1000;
            left: 0;
            top: 0;
            overflow-y: auto;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            display: block;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.2);
            border-left-color: white;
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
            max-width: calc(100vw - 250px);
            box-sizing: border-box;
        }
        .row {
            margin-left: 0;
            margin-right: 0;
        }
        .card {
            max-width: 100%;
        }
        .user-card {
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .badge-admin { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .badge-active { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .badge-inactive { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                min-height: auto;
            }
            
            .main-content {
                margin-left: 0;
                max-width: 100%;
                padding: 15px;
            }
            
            .user-card .row {
                flex-direction: column;
            }
            
            .user-card .col-md-4,
            .user-card .col-md-3,
            .user-card .col-md-2 {
                width: 100%;
                max-width: 100%;
                margin-bottom: 10px;
            }
            
            .user-card .text-end {
                text-align: left !important;
            }
            
            .user-card .btn {
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid" style="padding: 0; overflow-x: hidden;">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-4">
                    <h4><i class="fas fa-shield-alt"></i> 管理后台</h4>
                </div>
                <a href="/admin/dashboard">
                    <i class="fas fa-tachometer-alt"></i> 仪表板
                </a>
                <a href="/admin/users" class="active">
                    <i class="fas fa-users"></i> 用户管理
                </a>
                <a href="/admin/settings">
                    <i class="fas fa-cog"></i> 系统设置
                </a>
                <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px;">
                    <a href="/">
                        <i class="fas fa-home"></i> 返回主页
                    </a>
                    <a href="/auth/logout">
                        <i class="fas fa-sign-out-alt"></i> 退出登录
                    </a>
                </div>
            </div>

            <!-- 主内容区 -->
            <div class="main-content">
                <h2 class="mb-4">用户管理</h2>

                <div id="alertBox" class="alert alert-success d-none" role="alert">
                    <i class="fas fa-check-circle"></i>
                    <span id="alertMessage"></span>
                </div>

                <!-- 用户列表 -->
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-users"></i> 用户列表 ({{ users|length }} 人)</h5>
                    </div>
                    <div class="card-body">
                        {% for user in users %}
                        <div class="user-card">
                            <div class="row align-items-center">
                                <div class="col-md-4">
                                    <h5 class="mb-1">
                                        <i class="fas fa-user"></i> {{ user.username }}
                                        {% if user.is_admin %}
                                        <span class="badge badge-admin">管理员</span>
                                        {% endif %}
                                    </h5>
                                    <small class="text-muted">
                                        <i class="fas fa-envelope"></i> {{ user.email }}
                                    </small>
                                </div>
                                <div class="col-md-3">
                                    <small class="text-muted">
                                        <i class="fas fa-calendar"></i> 注册时间<br>
                                        {{ user.created_at[:10] }}
                                    </small>
                                </div>
                                <div class="col-md-2">
                                    {% if user.is_active %}
                                    <span class="badge badge-active">
                                        <i class="fas fa-check"></i> 活跃
                                    </span>
                                    {% else %}
                                    <span class="badge badge-inactive">
                                        <i class="fas fa-ban"></i> 禁用
                                    </span>
                                    {% endif %}
                                </div>
                                <div class="col-md-3 text-end">
                                    <button class="btn btn-sm btn-info" onclick="viewUser('{{ user._id }}')">
                                        <i class="fas fa-eye"></i> 查看
                                    </button>
                                    <button class="btn btn-sm btn-warning" onclick="toggleStatus('{{ user._id }}')">
                                        <i class="fas fa-toggle-on"></i> 状态
                                    </button>
                                    <button class="btn btn-sm btn-primary" onclick="toggleAdmin('{{ user._id }}')">
                                        <i class="fas fa-shield-alt"></i> 权限
                                    </button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteUser('{{ user._id }}', '{{ user.username }}')">
                                        <i class="fas fa-trash"></i> 删除
                                    </button>
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script>
        function showAlert(message, type = 'success') {
            const alertBox = $('#alertBox');
            const alertMessage = $('#alertMessage');
            
            alertBox.removeClass('alert-success alert-danger')
                    .addClass(`alert-${type}`)
                    .removeClass('d-none');
            alertMessage.text(message);
            
            setTimeout(() => {
                alertBox.addClass('d-none');
            }, 3000);
        }

        function viewUser(userId) {
            window.location.href = `/admin/user/${userId}`;
        }

        function toggleStatus(userId) {
            if (!confirm('确定要切换用户状态吗？')) return;
            
            $.ajax({
                url: `/admin/user/${userId}/toggle-status`,
                method: 'POST',
                success: function(response) {
                    showAlert('状态已更新', 'success');
                    setTimeout(() => location.reload(), 1000);
                },
                error: function(xhr) {
                    const error = xhr.responseJSON?.error || '操作失败';
                    showAlert(error, 'danger');
                }
            });
        }

        function toggleAdmin(userId) {
            if (!confirm('确定要切换管理员权限吗？')) return;
            
            $.ajax({
                url: `/admin/user/${userId}/toggle-admin`,
                method: 'POST',
                success: function(response) {
                    showAlert('权限已更新', 'success');
                    setTimeout(() => location.reload(), 1000);
                },
                error: function(xhr) {
                    const error = xhr.responseJSON?.error || '操作失败';
                    showAlert(error, 'danger');
                }
            });
        }

        function deleteUser(userId, username) {
            if (!confirm(`确定要删除用户 "${username}" 吗？\n\n此操作将删除该用户的所有数据，且无法恢复！`)) return;
            
            $.ajax({
                url: `/admin/user/${userId}/delete`,
                method: 'POST',
                success: function(response) {
                    showAlert('用户已删除', 'success');
                    setTimeout(() => location.reload(), 1000);
                },
                error: function(xhr) {
                    const error = xhr.responseJSON?.error || '删除失败';
                    showAlert(error, 'danger');
                }
            });
        }
    </script>
</body>
</html>
