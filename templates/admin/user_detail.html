<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>用户详情 - 冰箱里面还有啥</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/ice-box.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/admin/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/admin/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/admin/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/admin/components.css') }}">
    <style>
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: var(--spacing-md) 0;
            border-bottom: 1px solid var(--divider-color);
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .info-value {
            text-align: right;
            flex: 1;
            margin-left: var(--spacing-md);
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="admin-header">
        <a href="/admin/users" class="admin-header-back">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="admin-header-title">用户详情</div>
        <div class="admin-header-action"></div>
    </header>

    <!-- 主内容区 -->
    <div class="admin-container">
        <div class="admin-content">
            <!-- 提示框 -->
            <div id="alertBox" class="alert" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <span id="alertMessage"></span>
            </div>

            <!-- 加载动画 -->
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
            </div>

            <!-- 基本信息 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-info-circle"></i> 基本信息
                </div>
                <div class="card-body">
                    <div class="info-row">
                        <div class="info-label">用户名</div>
                        <div class="info-value">{{ user.username }}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">邮箱</div>
                        <div class="info-value">{{ user.email }}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">用户ID</div>
                        <div class="info-value" style="font-family: monospace; font-size: 12px;">{{ user._id }}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">注册时间</div>
                        <div class="info-value">{{ user.created_at }}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">账号状态</div>
                        <div class="info-value">
                            {% if user.is_active %}
                            <span class="badge badge-success">
                                <i class="fas fa-check"></i> 活跃
                            </span>
                            {% else %}
                            <span class="badge badge-danger">
                                <i class="fas fa-ban"></i> 禁用
                            </span>
                            {% endif %}
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">权限</div>
                        <div class="info-value">
                            {% if user.is_admin %}
                            <span class="badge badge-primary">
                                <i class="fas fa-shield-alt"></i> 管理员
                            </span>
                            {% else %}
                            <span class="badge badge-secondary">
                                <i class="fas fa-user"></i> 普通用户
                            </span>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </div>

            <!-- 数据统计 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-chart-bar"></i> 数据统计
                </div>
                <div class="card-body">
                    <div class="info-row">
                        <div class="info-label">物品数量</div>
                        <div class="info-value">
                            <span class="badge badge-primary">{{ user.item_count }}</span> 个
                        </div>
                    </div>
                </div>
            </div>

            <!-- 管理操作 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-tools"></i> 管理操作
                </div>
                <div class="card-body">
                    <div class="action-buttons">
                        <button class="btn btn-warning btn-block" onclick="toggleStatus()">
                            <i class="fas fa-toggle-on"></i> 切换账号状态
                        </button>
                        <button class="btn btn-primary btn-block" onclick="toggleAdmin()">
                            <i class="fas fa-shield-alt"></i> 切换管理员权限
                        </button>
                        <button class="btn btn-secondary btn-block" onclick="resetPassword()">
                            <i class="fas fa-key"></i> 重置密码
                        </button>
                        <button class="btn btn-danger btn-block" onclick="deleteUser()">
                            <i class="fas fa-trash"></i> 删除用户
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <nav class="admin-nav">
        <a href="/admin/dashboard" class="admin-nav-item">
            <i class="fas fa-tachometer-alt"></i>
            <span>仪表板</span>
        </a>
        <a href="/admin/users" class="admin-nav-item active">
            <i class="fas fa-users"></i>
            <span>用户</span>
        </a>
        <a href="/admin/settings" class="admin-nav-item">
            <i class="fas fa-cog"></i>
            <span>设置</span>
        </a>
        <a href="/" class="admin-nav-item">
            <i class="fas fa-home"></i>
            <span>主页</span>
        </a>
    </nav>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin/utils.js') }}"></script>
    <script>
        const userId = '{{ user._id }}';
        const username = '{{ user.username }}';

        async function toggleStatus() {
            showConfirm('确认操作', '确定要切换用户状态吗?', async () => {
                showLoading(true);
                
                try {
                    const result = await apiRequest(`/admin/user/${userId}/toggle-status`, 'POST');
                    showAlert(result.message || '状态已更新', 'success');
                    setTimeout(() => location.reload(), 1000);
                } catch (error) {
                    showAlert('操作失败: ' + error.message, 'danger');
                } finally {
                    showLoading(false);
                }
            });
        }

        async function toggleAdmin() {
            showConfirm('确认操作', '确定要切换管理员权限吗?', async () => {
                showLoading(true);
                
                try {
                    const result = await apiRequest(`/admin/user/${userId}/toggle-admin`, 'POST');
                    showAlert(result.message || '权限已更新', 'success');
                    setTimeout(() => location.reload(), 1000);
                } catch (error) {
                    showAlert('操作失败: ' + error.message, 'danger');
                } finally {
                    showLoading(false);
                }
            });
        }

        async function deleteUser() {
            showConfirm(
                '危险操作',
                `确定要删除用户 "${username}" 吗?\n\n此操作将删除该用户的所有数据,且无法恢复!`,
                async () => {
                    showLoading(true);
                    
                    try {
                        const result = await apiRequest(`/admin/user/${userId}/delete`, 'POST');
                        showAlert(result.message || '用户已删除', 'success');
                        setTimeout(() => window.location.href = '/admin/users', 1000);
                    } catch (error) {
                        showAlert('删除失败: ' + error.message, 'danger');
                    } finally {
                        showLoading(false);
                    }
                }
            );
        }

        async function resetPassword() {
            // 创建密码输入对话框
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10000;
                animation: fadeIn 0.2s ease-out;
            `;
            
            const dialog = document.createElement('div');
            dialog.className = 'confirm-dialog';
            dialog.style.cssText = `
                background: white;
                border-radius: 12px;
                padding: 24px;
                margin: 0 20px;
                max-width: 400px;
                width: 100%;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
                animation: scaleIn 0.2s ease-out;
            `;
            
            dialog.innerHTML = `
                <div style="font-size: 18px; font-weight: 600; margin-bottom: 12px; color: var(--text-primary);">
                    <i class="fas fa-key"></i> 重置密码
                </div>
                <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">
                    为用户 <strong>${username}</strong> 设置新密码
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-primary);">
                        新密码 (至少6位)
                    </label>
                    <input type="password" id="newPassword" class="form-control" 
                           placeholder="请输入新密码" style="width: 100%;" minlength="6">
                    <div style="margin-top: 8px;">
                        <label style="display: flex; align-items: center; font-size: 14px; cursor: pointer;">
                            <input type="checkbox" id="showPassword" style="margin-right: 8px;">
                            显示密码
                        </label>
                    </div>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-secondary" style="flex: 1;" id="cancelBtn">
                        取消
                    </button>
                    <button class="btn btn-primary" style="flex: 1;" id="confirmResetBtn">
                        <i class="fas fa-check"></i> 确定重置
                    </button>
                </div>
            `;
            
            overlay.appendChild(dialog);
            document.body.appendChild(overlay);
            
            const passwordInput = document.getElementById('newPassword');
            const showPasswordCheckbox = document.getElementById('showPassword');
            const cancelBtn = document.getElementById('cancelBtn');
            const confirmBtn = document.getElementById('confirmResetBtn');
            
            // 显示/隐藏密码
            showPasswordCheckbox.addEventListener('change', () => {
                passwordInput.type = showPasswordCheckbox.checked ? 'text' : 'password';
            });
            
            // 取消按钮
            cancelBtn.addEventListener('click', () => {
                overlay.remove();
            });
            
            // 确定按钮
            confirmBtn.addEventListener('click', async () => {
                const newPassword = passwordInput.value.trim();
                
                if (!newPassword) {
                    showAlert('请输入新密码', 'warning');
                    return;
                }
                
                if (newPassword.length < 6) {
                    showAlert('密码长度至少6位', 'warning');
                    return;
                }
                
                overlay.remove();
                showLoading(true);
                
                try {
                    const result = await apiRequest(`/admin/user/${userId}/reset-password`, 'POST', {
                        password: newPassword
                    });
                    showAlert(result.message || '密码已重置', 'success');
                } catch (error) {
                    showAlert('重置失败: ' + error.message, 'danger');
                } finally {
                    showLoading(false);
                }
            });
            
            // 点击遮罩层关闭
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.remove();
                }
            });
            
            // 自动聚焦到输入框
            setTimeout(() => passwordInput.focus(), 100);
        }
    </script>
</body>
</html>
