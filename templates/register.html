<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 冰箱管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }
        .register-title {
            text-align: center;
            margin-bottom: 30px;
            color: #667eea;
            font-weight: bold;
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: bold;
        }
        .btn-register:hover {
            opacity: 0.9;
        }
        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        .password-strength {
            height: 5px;
            border-radius: 3px;
            margin-top: 5px;
            transition: all 0.3s;
        }
        .strength-weak { background: #dc3545; width: 33%; }
        .strength-medium { background: #ffc107; width: 66%; }
        .strength-strong { background: #28a745; width: 100%; }
        .input-group-text {
            cursor: pointer;
        }
        .form-control.is-valid {
            border-color: #28a745;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'%3e%3cpath fill='%2328a745' d='M2.3 6.73L.6 4.53c-.4-1.04.46-1.4 1.1-.8l1.1 1.4 3.4-3.8c.6-.63 1.6-.27 1.2.7l-4 4.6c-.43.5-.8.4-1.1.1z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right calc(.375em + .1875rem) center;
            background-size: calc(.75em + .375rem) calc(.75em + .375rem);
        }
        .form-control.is-invalid {
            border-color: #dc3545;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' width='12' height='12' fill='none' stroke='%23dc3545'%3e%3ccircle cx='6' cy='6' r='4.5'/%3e%3cpath stroke-linejoin='round' d='M5.8 3.6h.4L6 6.5z'/%3e%3ccircle cx='6' cy='8.2' r='.6' fill='%23dc3545' stroke='none'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right calc(.375em + .1875rem) center;
            background-size: calc(.75em + .375rem) calc(.75em + .375rem);
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .requirements {
            font-size: 0.875rem;
            color: #6c757d;
            margin-top: 5px;
        }
        .requirements li {
            list-style: none;
            padding-left: 20px;
            position: relative;
        }
        .requirements li:before {
            content: "○";
            position: absolute;
            left: 0;
        }
        .requirements li.valid:before {
            content: "✓";
            color: #28a745;
        }
        .requirements li.invalid:before {
            content: "✗";
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2 class="register-title">🧊 注册账号</h2>
        
        <div id="alertBox" class="alert alert-danger d-none" role="alert">
            <i class="fas fa-exclamation-circle"></i>
            <span id="alertMessage"></span>
        </div>

        <form id="registerForm" novalidate>
            <div class="mb-3">
                <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="username" name="username" 
                       required minlength="3" maxlength="20" pattern="^[a-zA-Z0-9_\u4e00-\u9fa5]+$">
                <div class="invalid-feedback">
                    用户名必须是 3-20 个字符，只能包含字母、数字、下划线或中文
                </div>
                <div class="valid-feedback">
                    用户名可用
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">邮箱 <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="email" name="email" required>
                <div class="invalid-feedback">
                    请输入有效的邮箱地址
                </div>
                <div class="valid-feedback">
                    邮箱格式正确
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">密码 <span class="text-danger">*</span></label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password" 
                           required minlength="6" maxlength="50">
                    <span class="input-group-text" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
                <div class="password-strength" id="passwordStrength"></div>
                <ul class="requirements" id="passwordRequirements">
                    <li id="req-length">至少 6 个字符</li>
                    <li id="req-letter">包含字母</li>
                    <li id="req-number">包含数字</li>
                </ul>
            </div>

            <div class="mb-3">
                <label for="confirmPassword" class="form-label">确认密码 <span class="text-danger">*</span></label>
                <div class="input-group">
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                    <span class="input-group-text" id="toggleConfirmPassword">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
                <div class="invalid-feedback">
                    两次输入的密码不一致
                </div>
                <div class="valid-feedback">
                    密码一致
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-register" id="submitBtn">
                <i class="fas fa-user-plus"></i> 注册
            </button>
        </form>
        
        <div class="login-link">
            <span>已有账号？</span>
            <a href="/auth/login">立即登录</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script>
        // 显示/隐藏密码
        $('#togglePassword').on('click', function() {
            const passwordInput = $('#password');
            const icon = $(this).find('i');
            if (passwordInput.attr('type') === 'password') {
                passwordInput.attr('type', 'text');
                icon.removeClass('fa-eye').addClass('fa-eye-slash');
            } else {
                passwordInput.attr('type', 'password');
                icon.removeClass('fa-eye-slash').addClass('fa-eye');
            }
        });

        $('#toggleConfirmPassword').on('click', function() {
            const passwordInput = $('#confirmPassword');
            const icon = $(this).find('i');
            if (passwordInput.attr('type') === 'password') {
                passwordInput.attr('type', 'text');
                icon.removeClass('fa-eye').addClass('fa-eye-slash');
            } else {
                passwordInput.attr('type', 'password');
                icon.removeClass('fa-eye-slash').addClass('fa-eye');
            }
        });

        // 密码强度检测
        $('#password').on('input', function() {
            const password = $(this).val();
            const strengthBar = $('#passwordStrength');
            
            // 检查要求
            const hasLength = password.length >= 6;
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            
            $('#req-length').toggleClass('valid', hasLength).toggleClass('invalid', !hasLength);
            $('#req-letter').toggleClass('valid', hasLetter).toggleClass('invalid', !hasLetter);
            $('#req-number').toggleClass('valid', hasNumber).toggleClass('invalid', !hasNumber);
            
            // 计算强度
            let strength = 0;
            if (hasLength) strength++;
            if (hasLetter) strength++;
            if (hasNumber) strength++;
            if (password.length >= 10) strength++;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;
            
            strengthBar.removeClass('strength-weak strength-medium strength-strong');
            if (strength <= 2) {
                strengthBar.addClass('strength-weak');
            } else if (strength <= 4) {
                strengthBar.addClass('strength-medium');
            } else {
                strengthBar.addClass('strength-strong');
            }
        });

        // 实时验证
        function validateField(field) {
            const input = $(field);
            const value = input.val().trim();
            
            if (input.attr('id') === 'username') {
                const pattern = /^[a-zA-Z0-9_\u4e00-\u9fa5]{3,20}$/;
                if (value && pattern.test(value)) {
                    input.removeClass('is-invalid').addClass('is-valid');
                    return true;
                } else if (value) {
                    input.removeClass('is-valid').addClass('is-invalid');
                    return false;
                }
            }
            
            if (input.attr('id') === 'email') {
                const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (value && pattern.test(value)) {
                    input.removeClass('is-invalid').addClass('is-valid');
                    return true;
                } else if (value) {
                    input.removeClass('is-valid').addClass('is-invalid');
                    return false;
                }
            }
            
            if (input.attr('id') === 'password') {
                const hasLength = value.length >= 6;
                const hasLetter = /[a-zA-Z]/.test(value);
                const hasNumber = /[0-9]/.test(value);
                
                if (value && hasLength && hasLetter && hasNumber) {
                    input.removeClass('is-invalid').addClass('is-valid');
                    return true;
                } else if (value) {
                    input.removeClass('is-valid').addClass('is-invalid');
                    return false;
                }
            }
            
            if (input.attr('id') === 'confirmPassword') {
                const password = $('#password').val();
                if (value && value === password) {
                    input.removeClass('is-invalid').addClass('is-valid');
                    return true;
                } else if (value) {
                    input.removeClass('is-valid').addClass('is-invalid');
                    return false;
                }
            }
            
            return null;
        }

        // 绑定实时验证
        $('#username, #email, #password, #confirmPassword').on('blur', function() {
            validateField(this);
        });

        $('#confirmPassword').on('input', function() {
            validateField(this);
        });

        // 显示错误消息
        function showAlert(message, type = 'danger') {
            const alertBox = $('#alertBox');
            const alertMessage = $('#alertMessage');
            
            alertBox.removeClass('alert-danger alert-success alert-warning')
                    .addClass(`alert-${type}`)
                    .removeClass('d-none');
            alertMessage.text(message);
            
            setTimeout(() => {
                alertBox.addClass('d-none');
            }, 5000);
        }

        // 表单提交
        $('#registerForm').on('submit', function(e) {
            e.preventDefault();
            
            // 验证所有字段
            let isValid = true;
            $('#username, #email, #password, #confirmPassword').each(function() {
                if (validateField(this) === false) {
                    isValid = false;
                }
            });
            
            if (!isValid) {
                showAlert('请检查表单中的错误', 'warning');
                return;
            }
            
            // 禁用提交按钮
            const submitBtn = $('#submitBtn');
            submitBtn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> 注册中...');
            
            $.ajax({
                url: '/auth/register',
                method: 'POST',
                data: $(this).serialize(),
                success: function(response) {
                    showAlert('注册成功！正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                },
                error: function(xhr) {
                    const error = xhr.responseJSON?.error || '注册失败，请稍后重试';
                    showAlert(error, 'danger');
                    submitBtn.prop('disabled', false).html('<i class="fas fa-user-plus"></i> 注册');
                }
            });
        });
    </script>
</body>
</html>
