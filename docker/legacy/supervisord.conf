[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/supervisor/nginx.err.log
stdout_logfile=/var/log/supervisor/nginx.out.log
priority=10

[program:gunicorn]
command=gunicorn -w 4 -b 127.0.0.1:8080 --timeout 300 --access-logfile - --error-logfile - run:app
directory=/app
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/supervisor/gunicorn.err.log
stdout_logfile=/var/log/supervisor/gunicorn.out.log
priority=20
environment=PYTHONUNBUFFERED=1,FLASK_ENV=production
